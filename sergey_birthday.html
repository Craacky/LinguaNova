<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днём Рождения, Сергей!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Raleway', sans-serif;
    overflow-x: hidden;
    padding: 20px;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }

  @keyframes twinkle {
    to { opacity: var(--o); transform: scale(1.5); }
  }

  .card-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
  }

  .card {
    background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border: 1px solid rgba(255,215,0,0.25);
    border-radius: 24px;
    padding: 50px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(255,190,0,0.08), 0 30px 60px rgba(0,0,0,0.6);
    animation: fadeUp 1s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 60% 40%, rgba(255,215,0,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .corner-ornament {
    position: absolute;
    font-size: 28px;
    opacity: 0.35;
    line-height: 1;
  }
  .corner-ornament.tl { top: 18px; left: 22px; }
  .corner-ornament.tr { top: 18px; right: 22px; }
  .corner-ornament.bl { bottom: 18px; left: 22px; }
  .corner-ornament.br { bottom: 18px; right: 22px; }

  .greeting-tag {
    display: inline-block;
    background: rgba(255,215,0,0.12);
    border: 1px solid rgba(255,215,0,0.3);
    color: #ffd700;
    font-family: 'Raleway', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 28px;
    animation: fadeUp 1s 0.2s ease both;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 12vw, 64px);
    font-weight: 700;
    color: #fff;
    line-height: 1.05;
    letter-spacing: -1px;
    margin-bottom: 6px;
    animation: fadeUp 1s 0.3s ease both;
  }

  .name span {
    display: block;
    font-style: italic;
    font-weight: 400;
    font-size: 0.55em;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 28px 0;
    animation: fadeUp 1s 0.4s ease both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,215,0,0.4), transparent);
  }
  .divider-icon { color: #ffd700; font-size: 18px; }

  .message {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 17px;
    color: rgba(255,255,255,0.75);
    line-height: 1.7;
    margin-bottom: 36px;
    animation: fadeUp 1s 0.5s ease both;
  }

  .gift-block {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 32px;
    position: relative;
    animation: fadeUp 1s 0.6s ease both;
  }

  .gift-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,215,0,0.6);
    font-weight: 600;
    margin-bottom: 14px;
  }

  .gift-icon-row {
    font-size: 36px;
    margin-bottom: 14px;
  }

  .shop-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }

  .shop-link {
    font-size: 13px;
    color: rgba(255,215,0,0.6);
    margin-bottom: 20px;
    display: block;
    text-decoration: none;
  }

  .amount-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .amount {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 700;
    color: #ffd700;
    line-height: 1;
  }

  .amount-label {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    font-weight: 300;
    text-align: left;
    line-height: 1.3;
  }

  .qr-block {
    animation: fadeUp 1s 0.7s ease both;
  }

  .qr-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    font-weight: 600;
    margin-bottom: 16px;
  }

  .qr-frame {
    display: inline-block;
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
  }

  .qr-frame img {
    width: 140px;
    height: 140px;
    display: block;
    border-radius: 4px;
  }

  .qr-hint {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    font-weight: 300;
  }

  .from-block {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.07);
    animation: fadeUp 1s 0.8s ease both;
  }

  .from-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 8px;
  }

  .from-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-style: italic;
    color: rgba(255,255,255,0.65);
  }

  .confetti {
    position: fixed;
    top: -10px;
    pointer-events: none;
    z-index: 99;
    font-size: 20px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .gift-icon-row {
    animation: float 3s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card-wrapper">
  <div class="card">
    <div class="corner-ornament tl">✦</div>
    <div class="corner-ornament tr">✦</div>
    <div class="corner-ornament bl">✦</div>
    <div class="corner-ornament br">✦</div>

    <div class="greeting-tag">С Днём Рождения</div>

    <div class="name">
      Сергей
      <span>поздравляем тебя!</span>
    </div>

    <div class="divider"><span class="divider-icon">✦</span></div>

    <p class="message">
      Желаем тебе здоровья, вдохновения<br>
      и всего самого лучшего!<br>
      А пока — держи подарок от нас&nbsp;🎁
    </p>

    <div class="gift-block">
      <div class="gift-label">Подарочный сертификат</div>
      <div class="gift-icon-row">🔧</div>
      <div class="shop-name">Tools.by</div>
      <a class="shop-link" href="https://tools.by/" target="_blank">tools.by</a>
      <div class="amount-row">
        <div class="amount">250</div>
        <div class="amount-label">рублей<br>на любые<br>покупки</div>
      </div>
    </div>

    <div class="qr-block">
      <div class="qr-label">Открыть магазин</div>
      <div class="qr-frame">
        <img
          src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=https%3A%2F%2Ftools.by%2F&color=0d0d0d&bgcolor=ffffff&qzone=1&margin=0"
          alt="QR код Tools.by"
        />
      </div>
      <div class="qr-hint">Наведи камеру на QR код</div>
    </div>

    <div class="from-block">
      <div class="from-label">С любовью от</div>
      <div class="from-name">Коллег</div>
    </div>
  </div>
</div>

<script>
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      --o:${0.2+Math.random()*0.7};
      animation-delay:${Math.random()*4}s;
      width:${Math.random()<0.2?3:2}px;
      height:${Math.random()<0.2?3:2}px;
    `;
    starsContainer.appendChild(s);
  }

  const emojis = ['🎉','🎊','🥳','✨','🌟','💫','🎈','🎁'];
  function spawnConfetti() {
    for (let i = 0; i < 12; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        el.style.cssText = `left:${Math.random()*100}%;animation-duration:${3+Math.random()*3}s;font-size:${16+Math.random()*16}px;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 6000);
      }, i * 120);
    }
  }
  spawnConfetti();
  setInterval(spawnConfetti, 8000);
</script>
</body>
</html>
